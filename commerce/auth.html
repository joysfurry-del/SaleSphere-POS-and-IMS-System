<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Salesphere</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
<div class="container header-inner">
<a href="index.html" class="logo">Salesphere</a>
<nav>
<a href="index.html">Home</a>
<a href="cart.html">Cart <span class="cart-count" id="cart-count">0</span></a>
</nav>
<div id="auth-container"></div>
</div>
</header>

<main class="container">
<div class="auth-page">
<h1>Welcome</h1>

<div class="auth-tabs">
<button class="auth-tab active" data-tab="login">Sign In</button>
<button class="auth-tab" data-tab="register">Create Account</button>
</div>

<div class="auth-form active" id="form-login">
<form id="login-form" novalidate>
<div class="form-group" id="field-login-email">
<label>Email Address <span class="required">*</span></label>
<input type="email" id="login-email" placeholder="john@example.com" required>
<div class="error-text">Please enter your email</div>
</div>
<div class="form-group" id="field-login-password">
<label>Password <span class="required">*</span></label>
<input type="password" id="login-password" placeholder="Enter your password" required>
<div class="error-text">Please enter your password</div>
</div>
<div id="login-error" style="display:none;padding:10px 14px;background:rgba(239,68,68,0.12);border:1px solid var(--danger);border-radius:var(--radius-sm);margin-bottom:16px;color:var(--danger);font-size:14px;"></div>
<button type="submit" class="btn btn-primary btn-lg btn-block" id="login-btn">Sign In</button>
<div class="form-footer">Don't have an account? <a id="switch-to-register">Create one</a></div>
</form>
</div>

<div class="auth-form" id="form-register">
<form id="register-form" novalidate>
<div class="form-group" id="field-reg-name">
<label>Full Name <span class="required">*</span></label>
<input type="text" id="reg-name" placeholder="John Doe" required>
<div class="error-text">Please enter your name</div>
</div>
<div class="form-group" id="field-reg-email">
<label>Email Address <span class="required">*</span></label>
<input type="email" id="reg-email" placeholder="john@example.com" required>
<div class="error-text">Please enter a valid email</div>
</div>
<div class="form-group">
<label>Phone Number</label>
<input type="tel" id="reg-phone" placeholder="0123456789">
</div>
<div class="form-group" id="field-reg-password">
<label>Password <span class="required">*</span></label>
<input type="password" id="reg-password" placeholder="At least 6 characters" required minlength="6">
<div class="error-text">Password must be at least 6 characters</div>
</div>
<div id="register-error" style="display:none;padding:10px 14px;background:rgba(239,68,68,0.12);border:1px solid var(--danger);border-radius:var(--radius-sm);margin-bottom:16px;color:var(--danger);font-size:14px;"></div>
<button type="submit" class="btn btn-primary btn-lg btn-block" id="register-btn">Create Account</button>
<div class="form-footer">Already have an account? <a id="switch-to-login">Sign in</a></div>
</form>
</div>
</div>
</main>

<script src="js/api.js"></script>
<script>
(function () {
    var params = new URLSearchParams(window.location.search);
    var redirect = params.get('redirect') || 'index.html';

    var tabs = document.querySelectorAll('.auth-tab');
    var loginForm = document.getElementById('form-login');
    var registerForm = document.getElementById('form-register');

    // switch between login and register tabs
    tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
            tabs.forEach(function (t) { t.classList.remove('active'); });
            this.classList.add('active');
            if (this.dataset.tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        });
    });

    document.getElementById('switch-to-register').addEventListener('click', function (e) {
        e.preventDefault();
        tabs[1].click();
    });
    document.getElementById('switch-to-login').addEventListener('click', function (e) {
        e.preventDefault();
        tabs[0].click();
    });

    if (isLoggedIn()) {
        window.location.href = redirect;
        return;
    }

    // login form submit handler
    document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var email = document.getElementById('login-email').value.trim();
        var password = document.getElementById('login-password').value.trim();
        var valid = true;
        if (!email) { document.getElementById('field-login-email').classList.add('has-error'); valid = false; }
        else { document.getElementById('field-login-email').classList.remove('has-error'); }
        if (!password) { document.getElementById('field-login-password').classList.add('has-error'); valid = false; }
        else { document.getElementById('field-login-password').classList.remove('has-error'); }
        if (!valid) return;

        var btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        document.getElementById('login-error').style.display = 'none';

        apiPost('auth/login.php', { email: email, password: password })
            .then(function (data) {
                setAuth(data.data);
                showToast('Welcome back, ' + (data.data.name || '') + '!');
                setTimeout(function () { window.location.href = redirect; }, 500);
            })
            .catch(function (err) {
                btn.disabled = false;
                btn.textContent = 'Sign In';
                var errEl = document.getElementById('login-error');
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            });
    });

    // register form submit handler
    document.getElementById('register-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var name = document.getElementById('reg-name').value.trim();
        var email = document.getElementById('reg-email').value.trim();
        var phone = document.getElementById('reg-phone').value.trim();
        var password = document.getElementById('reg-password').value.trim();
        var valid = true;

        if (!name) { document.getElementById('field-reg-name').classList.add('has-error'); valid = false; }
        else { document.getElementById('field-reg-name').classList.remove('has-error'); }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('field-reg-email').classList.add('has-error'); valid = false; }
        else { document.getElementById('field-reg-email').classList.remove('has-error'); }
        if (!password || password.length < 6) { document.getElementById('field-reg-password').classList.add('has-error'); valid = false; }
        else { document.getElementById('field-reg-password').classList.remove('has-error'); }
        if (!valid) return;

        var btn = document.getElementById('register-btn');
        btn.disabled = true;
        btn.textContent = 'Creating account...';
        document.getElementById('register-error').style.display = 'none';

        var body = { name: name, email: email, password: password };
        if (phone) body.phone = phone;

        apiPost('auth/register.php', body)
            .then(function (data) {
                setAuth(data.data);
                showToast('Account created! Welcome, ' + (data.data.name || '') + '!');
                setTimeout(function () { window.location.href = redirect; }, 500);
            })
            .catch(function (err) {
                btn.disabled = false;
                btn.textContent = 'Create Account';
                var errEl = document.getElementById('register-error');
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            });
    });

    initAuthUI();
    getCartToken();
    updateCartBadge();
})();
</script>
</body>
</html>
