<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product - Salesphere</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
<div class="container header-inner">
<a href="index.html" class="logo">Salesphere</a>
    <nav>
<a href="index.html">Home</a>
<a href="cart.html">Cart <span class="cart-count" id="cart-count">0</span></a>
<a href="order-history.html">Orders</a>
</nav>
<div id="auth-container"></div>
<div class="search-bar">
<input type="text" id="search-input" placeholder="Search products...">
</div>
</div>
</header>

<main class="container" id="main-content">
<div class="product-detail-loading page-spinner" id="loading-spinner"><div class="spinner"></div></div>

<div class="product-detail" id="product-detail" style="display:none">
<div class="product-detail-image" id="product-image"></div>
<div class="product-detail-info">
<h1 id="product-name"></h1>
<div class="price-large" id="product-price"></div>
<p class="description" id="product-description"></p>
<div class="meta" id="product-meta"></div>
<div id="stock-indicator"></div>

<div class="quantity-selector">
<button class="qty-btn-minus" id="qty-minus" type="button">&minus;</button>
<input type="number" id="qty-input" value="1" min="1" max="999">
<button class="qty-btn-plus" id="qty-plus" type="button">+</button>
</div>

<button class="btn btn-primary btn-lg btn-block" id="add-to-cart-btn">Add to Cart</button>
</div>
</div>

<div class="related-section" id="related-section" style="display:none">
<h2>Related Products</h2>
<div class="related-grid" id="related-grid"></div>
</div>
</main>

<script src="js/api.js"></script>
<script>
(function () {
    var params = new URLSearchParams(window.location.search);
    var productId = params.get('id');
    if (!productId) {
        document.getElementById('main-content').innerHTML = '<div class="error-state" style="padding:80px 20px;text-align:center"><h3>Product not found</h3><p>No product ID specified.</p><a href="index.html" class="btn btn-primary">Back to Home</a></div>';
        return;
    }

    var currentProduct = null;

    apiGet('products.php', { id: productId }).then(function (data) {
        currentProduct = data.data;
        if (!currentProduct) throw new Error('Product not found');
        renderProduct(currentProduct);
        loadRelated(currentProduct);
    }).catch(function (err) {
        document.getElementById('main-content').innerHTML = '<div class="error-state" style="padding:80px 20px;text-align:center"><h3>Product not found</h3><p>' + escapeHtml(err.message) + '</p><a href="index.html" class="btn btn-primary">Back to Home</a></div>';
    });

    // show product details on page
    function renderProduct(p) {
        document.getElementById('loading-spinner').style.display = 'none';
        document.getElementById('product-detail').style.display = 'grid';

        var imgContainer = document.getElementById('product-image');
        if (p.ProductImage) {
            imgContainer.style.backgroundImage = "url('" + escapeAttr(p.ProductImage) + "')";
        } else {
            var initial = p.ProductName ? p.ProductName.charAt(0).toUpperCase() : '?';
            imgContainer.className = 'product-detail-image placeholder';
            imgContainer.innerHTML = '<span>' + escapeHtml(initial) + '</span>';
        }

        document.getElementById('product-name').textContent = p.ProductName || '';
        document.getElementById('product-price').textContent = formatPrice(p.Price);
        document.getElementById('product-description').textContent = p.Description || 'No description available.';

        var metaHtml = '';
        if (p.ProductSKU) metaHtml += '<span class="meta-item"><strong>SKU:</strong> ' + escapeHtml(p.ProductSKU) + '</span>';
        if (p.CategoryName) metaHtml += '<span class="meta-item"><strong>Category:</strong> <span class="badge">' + escapeHtml(p.CategoryName) + '</span></span>';
        document.getElementById('product-meta').innerHTML = metaHtml;

        var stockEl = document.getElementById('stock-indicator');
        var stock = parseInt(p.Stock) || 0;
        if (stock > 0) {
            stockEl.innerHTML = '<span class="stock-indicator stock-in">In Stock (' + stock + ' available)</span>';
        } else {
            stockEl.innerHTML = '<span class="stock-indicator stock-out">Out of Stock</span>';
        }

        var qtyInput = document.getElementById('qty-input');
        qtyInput.max = Math.max(stock, 1);

        var addBtn = document.getElementById('add-to-cart-btn');
        if (stock <= 0) {
            addBtn.disabled = true;
            addBtn.textContent = 'Out of Stock';
        } else {
            addBtn.disabled = false;
            addBtn.textContent = 'Add to Cart';
        }

        document.title = p.ProductName + ' - Salesphere';
    }

    // load related products
    function loadRelated(p) {
        if (!p.CategoryName) return;
        apiGet('products.php', { limit: 10 }).then(function (data) {
            var products = data.data || [];
            var related = [];
            for (var i = 0; i < products.length; i++) {
                if (products[i].ProductID == productId) continue;
                if (products[i].CategoryName === p.CategoryName) {
                    related.push(products[i]);
                }
            }
            related = related.slice(0, 4);
            if (related.length === 0) return;
            document.getElementById('related-section').style.display = 'block';
            var html = '';
            for (var j = 0; j < related.length; j++) {
                var r = related[j];
                var imgHtml = '';
                if (r.ProductImage) {
                    imgHtml = '<div class="product-image" style="background-image:url(\'' + escapeAttr(r.ProductImage) + '\')"></div>';
                } else {
                    var init = r.ProductName ? r.ProductName.charAt(0).toUpperCase() : '?';
                    imgHtml = '<div class="product-image placeholder"><span>' + escapeHtml(init) + '</span></div>';
                }
                html += '<div class="product-card">' +
                    '<a href="product.html?id=' + r.ProductID + '">' + imgHtml + '</a>' +
                    '<div class="product-info">' +
                    '<span class="badge">' + escapeHtml(r.CategoryName || '') + '</span>' +
                    '<h3><a href="product.html?id=' + r.ProductID + '">' + escapeHtml(r.ProductName) + '</a></h3>' +
                    '<p class="price">' + formatPrice(r.Price) + '</p>' +
                    '</div></div>';
            }
            document.getElementById('related-grid').innerHTML = html;
        }).catch(function () {});
    }

    var qtyInput = document.getElementById('qty-input');
    document.getElementById('qty-minus').addEventListener('click', function () {
        var val = parseInt(qtyInput.value) || 1;
        if (val > 1) qtyInput.value = val - 1;
    });
    document.getElementById('qty-plus').addEventListener('click', function () {
        var val = parseInt(qtyInput.value) || 1;
        var max = parseInt(qtyInput.max) || 999;
        if (val < max) qtyInput.value = val + 1;
    });
    qtyInput.addEventListener('change', function () {
        var val = parseInt(this.value) || 1;
        var max = parseInt(this.max) || 999;
        if (val < 1) this.value = 1;
        else if (val > max) this.value = max;
    });

    // add product to cart
    document.getElementById('add-to-cart-btn').addEventListener('click', function () {
        var self = this;
        if (self.disabled) return;
        var qty = parseInt(qtyInput.value) || 1;
        self.disabled = true;
        self.textContent = 'Adding...';
        apiPost('cart.php', { action: 'add', cart_token: getCartToken(), product_id: parseInt(productId), quantity: qty })
            .then(function () {
                showToast('Added to cart!');
                updateCartBadge();
            })
            .catch(function (err) {
                showToast(err.message, 'error');
            })
            .finally(function () {
                self.disabled = false;
                self.textContent = 'Add to Cart';
            });
    });

    document.getElementById('search-input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
            var val = this.value.trim();
            if (val) window.location.href = 'index.html?search=' + encodeURIComponent(val);
        }
    });

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function escapeAttr(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    initAuthUI();
    getCartToken();
    updateCartBadge();
})();
</script>
</body>
</html>
